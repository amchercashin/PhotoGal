name: Build Windows

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.5.4)"
        required: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

permissions:
  contents: write

jobs:
  build-cpu:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          $before = [math]::Round((Get-PSDrive C).Free / 1GB, 1)
          Write-Host "Free space before cleanup: $before GB"
          Remove-Item -Recurse -Force "C:\Program Files\dotnet" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\Program Files\Android" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\Program Files\MongoDB" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\Program Files\MySQL" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\Program Files\PostgreSQL" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\Program Files (x86)\Microsoft SDKs\Azure" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\Modules" -ErrorAction SilentlyContinue
          $after = [math]::Round((Get-PSDrive C).Free / 1GB, 1)
          Write-Host "Free space after cleanup: $after GB (freed $([math]::Round($after - $before, 1)) GB)"

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: rust-windows-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: rust-windows-

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-windows-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: npm-windows-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install Tauri CLI
        run: cargo binstall tauri-cli --no-confirm

      - name: Create venv and install CPU torch
        working-directory: backend
        run: |
          uv venv .venv
          uv pip install --python .venv\Scripts\python.exe torch --index-url https://download.pytorch.org/whl/cpu
          uv pip install --python .venv\Scripts\python.exe onnxruntime
          uv pip install --python .venv\Scripts\python.exe .
          uv pip install --python .venv\Scripts\python.exe pyinstaller

      - name: Build sidecar with PyInstaller
        working-directory: backend
        run: .venv\Scripts\python.exe -m PyInstaller photogal-server.spec --noconfirm

      - name: Copy sidecar to Tauri resources
        run: |
          if (Test-Path "src-tauri\sidecar") { Remove-Item -Recurse -Force "src-tauri\sidecar" }
          Copy-Item -Recurse "backend\dist\photogal-server" "src-tauri\sidecar"

      - name: Free disk before Tauri build
        run: |
          Remove-Item -Recurse -Force "backend\dist" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "backend\build" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "backend\.venv" -ErrorAction SilentlyContinue
          uv cache clean
          $free = [math]::Round((Get-PSDrive C).Free / 1GB, 1)
          Write-Host "Free disk space: $free GB"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Build Tauri app (NSIS)
        run: cargo tauri build --bundles nsis

      - name: Get version
        id: version
        run: |
          $version = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Rename artifact
        run: |
          $src = "src-tauri\target\release\bundle\nsis\PhotoGal_${{ steps.version.outputs.VERSION }}_x64-setup.exe"
          Copy-Item $src "PhotoGal_${{ steps.version.outputs.VERSION }}_x64-setup.exe"

      - name: Wait for GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = if ("${{ github.event_name }}" -eq "workflow_dispatch") { "${{ inputs.tag }}" } else { "${{ github.ref_name }}" }
          for ($i = 1; $i -le 30; $i++) {
            if ((gh release view $tag 2>&1) -and $LASTEXITCODE -eq 0) { Write-Host "Release found"; break }
            Write-Host "Waiting... ($i/30)"; Start-Sleep -Seconds 10
          }

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = if ("${{ github.event_name }}" -eq "workflow_dispatch") { "${{ inputs.tag }}" } else { "${{ github.ref_name }}" }
          gh release upload $tag "PhotoGal_${{ steps.version.outputs.VERSION }}_x64-setup.exe" --clobber

  build-cuda:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          $before = [math]::Round((Get-PSDrive C).Free / 1GB, 1)
          Write-Host "Free space before cleanup: $before GB"
          Remove-Item -Recurse -Force "C:\Program Files\dotnet" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\Program Files\Android" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\Program Files\MongoDB" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\Program Files\MySQL" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\Program Files\PostgreSQL" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\Program Files (x86)\Microsoft SDKs\Azure" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\Modules" -ErrorAction SilentlyContinue
          $after = [math]::Round((Get-PSDrive C).Free / 1GB, 1)
          Write-Host "Free space after cleanup: $after GB (freed $([math]::Round($after - $before, 1)) GB)"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Create venv and install CUDA torch
        working-directory: backend
        run: |
          uv venv .venv
          uv pip install --python .venv\Scripts\python.exe torch --index-url https://download.pytorch.org/whl/cu128
          uv pip install --python .venv\Scripts\python.exe onnxruntime-gpu
          uv pip install --python .venv\Scripts\python.exe .
          uv pip install --python .venv\Scripts\python.exe pyinstaller

      - name: Build sidecar with PyInstaller
        working-directory: backend
        run: .venv\Scripts\python.exe -m PyInstaller photogal-server.spec --noconfirm

      - name: Trim unused CUDA DLLs (dependency-aware)
        working-directory: backend/dist/photogal-server
        run: |
          $torchLib = "_internal\torch\lib"
          if (-not (Test-Path $torchLib)) {
            Write-Host "torch/lib not found, skipping trim"
            exit 0
          }
          $before = (Get-ChildItem $torchLib -Filter "*.dll" | Measure-Object -Property Length -Sum).Sum / 1MB

          # Safe to remove unconditionally (not needed for inference, no dependents)
          $safeToRemove = @("nccl*", "nvtx*", "cutensor*", "caffe2_nvrtc*")
          foreach ($pattern in $safeToRemove) {
            Get-ChildItem "$torchLib\$pattern" -ErrorAction SilentlyContinue |
              ForEach-Object { Remove-Item $_.FullName -Force; Write-Host "Removed (safe): $($_.Name)" }
          }

          # Candidates: remove only if no remaining DLL depends on them
          $candidates = @("cufft*", "cusolver*", "curand*", "nvrtc*")
          foreach ($pattern in $candidates) {
            $dlls = Get-ChildItem "$torchLib\$pattern" -ErrorAction SilentlyContinue
            foreach ($dll in $dlls) {
              $dllName = $dll.Name
              $isNeeded = $false
              Get-ChildItem "$torchLib\*.dll" -ErrorAction SilentlyContinue |
                Where-Object { $_.Name -ne $dllName } |
                ForEach-Object {
                  $deps = & dumpbin /dependents $_.FullName 2>$null
                  if ($deps -match [regex]::Escape($dllName)) { $isNeeded = $true }
                }
              if ($isNeeded) {
                Write-Host "Kept (has dependents): $dllName"
              } else {
                Remove-Item $dll.FullName -Force
                Write-Host "Removed (no dependents): $dllName"
              }
            }
          }

          # Never remove: cudart, cublas, cublasLt, cusparse, nvJitLink, cudnn, c10_cuda, torch_cuda

          $after = (Get-ChildItem $torchLib -Filter "*.dll" | Measure-Object -Property Length -Sum).Sum / 1MB
          Write-Host "DLL size: $([math]::Round($before, 0)) MB -> $([math]::Round($after, 0)) MB (trimmed $([math]::Round($before - $after, 0)) MB)"

      - name: Get version
        id: version
        run: |
          $version = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Compress CUDA sidecar
        run: |
          7z a -mx=7 -mmt=on "PhotoGal_${{ steps.version.outputs.VERSION }}_cuda-sidecar.7z" ".\backend\dist\photogal-server\*"
          $size = [math]::Round((Get-Item "PhotoGal_${{ steps.version.outputs.VERSION }}_cuda-sidecar.7z").Length / 1MB, 0)
          Write-Host "CUDA sidecar archive: $size MB"
          if ($size -gt 2000) {
            Write-Error "CUDA archive exceeds 2GB GitHub limit: $size MB"
            exit 1
          }

      - name: Wait for GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = if ("${{ github.event_name }}" -eq "workflow_dispatch") { "${{ inputs.tag }}" } else { "${{ github.ref_name }}" }
          for ($i = 1; $i -le 30; $i++) {
            if ((gh release view $tag 2>&1) -and $LASTEXITCODE -eq 0) { Write-Host "Release found"; break }
            Write-Host "Waiting... ($i/30)"; Start-Sleep -Seconds 10
          }

      - name: Upload CUDA sidecar to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = if ("${{ github.event_name }}" -eq "workflow_dispatch") { "${{ inputs.tag }}" } else { "${{ github.ref_name }}" }
          gh release upload $tag "PhotoGal_${{ steps.version.outputs.VERSION }}_cuda-sidecar.7z" --clobber
